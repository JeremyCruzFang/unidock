<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="UniDock 为你分发校园地图与校园官网入口。">
  <meta name="theme-color" content="#f6f7fb">
  <title>UniDock | 选择校园入口</title>
  <link rel="stylesheet" href="./assets/css/base.css">
  <link rel="stylesheet" href="./assets/css/components.css">
  <link rel="stylesheet" href="./assets/css/pages.css">
  <link rel="stylesheet" href="./assets/css/animations.css">
</head>
<body class="redirect-page">
  <div class="site-background" aria-hidden="true">
    <div class="site-background__mesh"></div>
    <div class="site-background__orb site-background__orb--one"></div>
    <div class="site-background__orb site-background__orb--two"></div>
    <div class="site-background__orb site-background__orb--three"></div>
  </div>

  <main class="redirect-main">
    <div class="container redirect-shell">
      <a class="redirect-back" href="./index.html">返回首页</a>

      <section class="redirect-stage redirect-stage--choice" aria-labelledby="redirect-title">
        <div class="redirect-stage__glow" aria-hidden="true"></div>

        <div class="redirect-icon" aria-hidden="true">
          <span class="redirect-icon__ring redirect-icon__ring--outer"></span>
          <span class="redirect-icon__ring redirect-icon__ring--inner"></span>
          <span class="redirect-icon__mark">U</span>
        </div>

        <span class="eyebrow redirect-stage__eyebrow">导航选择</span>
        <h1 id="redirect-title" class="redirect-stage__title">选择你要前往的校园入口</h1>
        <p class="redirect-stage__subtitle">地图和官网入口都已整理好，按你的当前需求继续前往。</p>

        <div class="choice-grid">
          <a class="choice-card choice-card--primary" href="./campus-map-redirect.html">
            <span class="choice-card__label">主入口</span>
            <h2 class="choice-card__title">校园地图</h2>
            <p class="choice-card__desc">先查看校内位置、教学区与生活区分布，适合快速找路。</p>
            <span class="choice-card__meta">立即前往</span>
          </a>

          <a class="choice-card" href="./official-site-redirect.html">
            <span class="choice-card__label">次入口</span>
            <h2 class="choice-card__title">校园官网入口</h2>
            <p class="choice-card__desc">前往学校官方站点，查看通知、公告与综合信息。</p>
            <span class="choice-card__meta">继续打开</span>
          </a>
        </div>

        <div class="redirect-actions redirect-actions--choice">
          <a class="button button--secondary" href="./index.html">返回首页</a>
        </div>
      </section>

      <p class="redirect-brand">UniDock</p>
    </div>
  </main>

  <script src="./assets/js/main.js" defer></script>
</body>
</html>
