<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="UniDock 正在为你打开南京信息工程大学官方网站。">
  <meta name="theme-color" content="#f6f7fb">
  <title>UniDock | 正在前往校园官网</title>
  <link rel="stylesheet" href="./assets/css/base.css">
  <link rel="stylesheet" href="./assets/css/components.css">
  <link rel="stylesheet" href="./assets/css/pages.css">
  <link rel="stylesheet" href="./assets/css/animations.css">
</head>
<body class="redirect-page" data-redirect-page data-redirect-target="https://www.nuist.edu.cn" data-redirect-delay="3">
  <div class="site-background" aria-hidden="true">
    <div class="site-background__mesh"></div>
    <div class="site-background__orb site-background__orb--one"></div>
    <div class="site-background__orb site-background__orb--two"></div>
    <div class="site-background__orb site-background__orb--three"></div>
  </div>

  <main class="redirect-main">
    <div class="container redirect-shell">
      <a class="redirect-back" href="./index.html">返回首页</a>

      <section class="redirect-stage" aria-labelledby="redirect-title">
        <div class="redirect-stage__glow" aria-hidden="true"></div>

        <div class="redirect-icon" aria-hidden="true">
          <span class="redirect-icon__ring redirect-icon__ring--outer"></span>
          <span class="redirect-icon__ring redirect-icon__ring--inner"></span>
          <span class="redirect-icon__mark">U</span>
        </div>

        <span class="eyebrow redirect-stage__eyebrow">站外打开</span>
        <h1 id="redirect-title" class="redirect-stage__title">正在前往校园官网</h1>
        <p class="redirect-stage__subtitle">即将跳转至南京信息工程大学官方网站。</p>

        <div class="redirect-domain" aria-label="目标域名">www.nuist.edu.cn</div>

        <p class="redirect-status" aria-live="polite">
          <span class="redirect-status__dot" aria-hidden="true"></span>
          <span>将在 <strong data-redirect-count>3</strong> 秒后自动打开</span>
        </p>

        <div class="redirect-actions">
          <a class="button button--primary" href="https://www.nuist.edu.cn" data-redirect-open>立即前往</a>
          <a class="button button--secondary" href="./index.html" data-redirect-home>返回首页</a>
        </div>
      </section>

      <p class="redirect-brand">UniDock</p>
    </div>
  </main>

  <script src="./assets/js/main.js" defer></script>
</body>
</html>
